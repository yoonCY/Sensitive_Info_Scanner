<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>민감정보 스캐너</title>
  <style>
    :root {
      --bg: #f2f6fb;
      --panel: #ffffff;
      --line: #d8e0ea;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #0f766e;
      --brand-soft: #ccfbf1;
      --danger: #b91c1c;
      --warn: #b45309;
      --ok: #15803d;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #e0f2fe 0, var(--bg) 40%);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 20px 28px;
    }

    .topbar {
      background: linear-gradient(120deg, #0f172a, #0f766e);
      color: #f8fafc;
      border-radius: 14px;
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .topbar p {
      margin: 4px 0 0;
      color: #d1fae5;
      font-size: 12px;
    }

    .tabbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #334155;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      border-color: #0f766e;
      background: var(--brand-soft);
      color: #115e59;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 14px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 15px;
      border-bottom: 1px solid #eef2f7;
      padding-bottom: 8px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 11px;
      color: #475569;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    input, select, button, textarea {
      font: inherit;
    }

    input:not([type]),
    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="search"],
    input[type="email"],
    input[type="url"],
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      font-size: 13px;
      color: #0f172a;
    }

    input:not([type]):focus,
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="number"]:focus,
    input[type="search"]:focus,
    input[type="email"]:focus,
    input[type="url"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #0f766e;
      box-shadow: 0 0 0 2px #99f6e4;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .hint.warn { color: var(--warn); }
    .hint.ok { color: var(--ok); }
    .hint.err { color: var(--danger); }

    .section-title {
      margin: 8px 0 6px;
      font-size: 12px;
      color: #0f172a;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .pillbox {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      padding: 8px;
      max-height: 160px;
      overflow: auto;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px;
    }

    .check-item {
      font-size: 12px;
      color: #334155;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .run-scope-grid,
    .plugin-grid {
      grid-template-columns: 1fr;
    }

    .run-scope-item,
    .plugin-item {
      align-items: flex-start;
      border: 1px solid #dbe5ef;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      gap: 8px;
    }

    .run-scope-item span,
    .plugin-item span {
      display: grid;
      gap: 2px;
    }

    .run-scope-item strong,
    .plugin-item strong {
      font-size: 12px;
      color: #0f172a;
    }

    .run-scope-item small,
    .plugin-item small {
      font-size: 11px;
      color: #64748b;
      line-height: 1.35;
    }

    .plugin-item.is-disabled {
      background: #f8fafc;
      opacity: 0.72;
    }

    .check-item input {
      width: auto;
      margin: 0;
      padding: 0;
      accent-color: var(--brand);
      flex: 0 0 auto;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.primary { background: var(--brand); color: #fff; }
    .btn.neutral { background: #e2e8f0; color: #334155; }
    .btn.outline { background: #fff; border: 1px solid #cbd5e1; color: #334155; }
    .btn.danger { background: #dc2626; color: #fff; }

    .config-accordion {
      display: grid;
      gap: 8px;
    }

    .config-item {
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      background: #f8fafc;
      overflow: hidden;
    }

    .config-head {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      gap: 8px;
    }

    .config-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .config-chip {
      background: #e2e8f0;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      color: #334155;
    }

    .config-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid #94a3b8;
      color: #334155;
      font-weight: 800;
      font-size: 13px;
    }

    .config-body {
      border-top: 1px solid #dbe5ef;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 780px;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #eef2f7;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .target-cell {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      padding: 9px;
    }

    .kpi .label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      font-weight: 700;
    }

    .kpi .value {
      font-size: 22px;
      font-weight: 800;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .status-running { color: #0369a1; }
    .status-completed { color: #15803d; }
    .status-failed { color: #b91c1c; }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #dbeafe;
      overflow: hidden;
      margin: 8px 0;
    }

    .progress > div {
      height: 100%;
      background: linear-gradient(90deg, #0891b2, #0f766e);
      transition: width .2s ease;
    }

    .report-findings-mobile {
      display: none;
      margin-top: 8px;
      gap: 8px;
    }

    .finding-card {
      border: 1px solid #dbe5ef;
      border-radius: 10px;
      padding: 10px;
      background: #f8fafc;
      display: grid;
      gap: 8px;
    }

    .finding-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .finding-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 8px;
      font-size: 12px;
      align-items: start;
    }

    .finding-row b {
      color: #334155;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .hidden { display: none; }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 1000;
      background: #0f172a;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 1160px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .shell {
        padding: 14px 12px 22px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .toast {
        right: 12px;
        left: 12px;
        bottom: 12px;
      }

      .report-findings-desktop {
        display: none;
      }

      .report-findings-mobile {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
